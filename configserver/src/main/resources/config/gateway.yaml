spring:
  cloud:
    gateway:
      routes:
        - id: userservice
          uri: lb://USERSERVICE
          predicates:
            - Path=/api/users/**

        - id: activityservice
          uri: lb://activityservice
          predicates:
            - Path=/api/activities/**

        - id: aiservice
          uri: lb://aiservice
          predicates:
            - Path=/api/recommendation/**

server:
  port: 8080

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
